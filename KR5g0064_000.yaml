body:
  text: 老子微旨例略鼓一天物之所以生功之所以成必生乎無形由乎無名無形無名者萬物之宗也不溫不凉不宫不商聽之不可得而聞視之不可得而彰體之不可得而知味之不可得而嘗故其為物也則混成為象也則無形為音也則希聲為味也則無呈故能為品物之宗主苞通靡使不經也若溫也則不能凉矣宫也則不能商矣形必有所分聲必有所屬故象而形者非大象也音而聲者非大音也然則四象不形則大象無以暢五音不聲則大音無以至四象形而物無所主焉則大象暢矣五音聲而心無所適焉則大音至矣故執大象則天下往用大音則風俗移也無形暢天下雖往往而不能釋也希聲至風俗雖移移而不能辨也是故天生五物無物為用聖行五教不言為化是以道可道非常道名可名非常名也五物之母不炎不寒不柔不剛五教之母不皎不昧不恩不傷雖古今不同時移俗易此不變也所謂自古及今其名不去者也天不以此則物不生治不以此則功不成故古今通終始同執古可以御今御今可以知古始此所謂常者也無皎昧之狀溫凉之象故知常曰明也物生功成莫不由乎此故以閲衆甫也夫奔電之疾猶不足以一時周御風之行猶不足以一息期善速在不疾善至在不行故可道之盛未足以官天地有形之極未足以府萬物是故歎之者不能盡乎斯羡詠之者不能暢乎斯弘名之不能當稱之不能既名必有所分稱必有所由有分則有不兼有由則有不盡不兼則大殊其真不盡則不可以名此可演而明也夫道也者取乎萬物之所由也玄也者取乎幽冥之所出也深也者取乎探賾而不可究也大也者取乎彌綸而不可極也遠也者取乎綿邈而不可及也微也者取乎幽微而不可覩也然則道玄深大微遠之言各有其義未盡其極者也然彌綸無極不可名細微妙無形不可名大是以篇云字之曰道謂之曰玄而不名也然則言之者失其常名之者離其真為之者敗其性執之者失其原矣是以聖人不以言為主則不違其常不以名為常則不離其真不以為為事則不敗其性不以執為制則不失其原矣然則老子之文欲辨而誥者則失其旨也欲名而責者則違其義也故其大歸也論太始之原以明自然之性演幽冥之極以定惑罔之迷因而不為損而不施崇本以息末守母以存子賤夫巧術為在未有無責於人必求諸己此其大要也而法者尚乎齊同而刑以檢之名者尚乎定真而名以正之儒者尚乎全愛而譽以進之墨者尚乎儉嗇而矯以立之雜者尚乎衆美而總以行之夫形以檢物巧僞必生名以定物理恕必失譽以進物爭尚必起矯以立物乖違必作雜以行物穢亂必興斯皆用其子而棄其母物失所載未足守也然致同塗異至合趣乖而學者惑其所致迷其所趣觀其齊同則謂之法覩其定真則謂之名察其純愛則謂之儒鑒其儉嗇則謂之墨見其不係則謂之雜隨其所鑒而正名焉順其所好而執意焉故使有紛紜憒錯之論殊趣辨扸之爭蓋由斯矣又其為文也舉終以證始不述始以盡終開而弗達導而弗率尋而後既其義推而後盡其理善發事始以首其論明夫會歸以終其文故使同趣而感發者莫不美其興言之始因而演焉異旨而獨搆者莫不說其會歸之徵以為證焉夫塗雖殊必同其歸慮雖百必均其致而舉夫歸致以明至理故使觸類而思者莫不欣其思之所應以為得其義焉凡物之所以存乃反其形功之所以尅乃反其名夫存者不以存為存以其不忘亡也安者不以安為安以其不忘危也故保其存者亡不忘亡者存安其位者危不忘危者安善力舉秋毫善聽聞雷霆此道之與形反也安者實安而曰非安之所安存者實存而曰非存之所存侯王實尊而曰非尊之所為天地實大而曰非大之所能聖功實存而曰絶聖之所立仁德實著而曰棄仁之所存故使見形而不及道者莫不忿其言焉夫欲定物之本者則雖近而必自遠以證其始欲明物之所由者則雖顯而必自幽以叙其本故取天地之外以明形骸之內明侯王孤寡之義而從道一以宣其始故使察近而不及流統之原者莫不誕其言以為虛焉是以云云者各申其說人美其亂或迂其言或譏其論若曉而昧若分而亂斯之由矣名也者定彼者也稱也者從謂者也名生乎彼稱出乎我故涉之乎無物而不由則稱之曰道求之乎無妙而不出則謂之曰玄妙出乎玄衆由乎道故生之畜之不壅不塞通物之性道之謂也生而不有為而不恃長而不宰有德而無主玄之德也玄謂之深者也道稱之大者也名號生乎形狀稱謂出乎涉求名號不虛生稱謂不虛出故名號則大失其旨稱謂則未盡其極是以謂玄則玄之又玄稱道則域中有四大也老子之書其幾乎可一言而蔽之噫崇本息末而已矣觀其所由尋其所歸言不遠宗事不失主文雖五千貫之者一義雖廣贍衆則同類解其一言而蔽之則無幽而不識每事各為意則雖辨而愈惑嘗試論之曰夫邪之興也豈邪者之所為乎淫之所起也豈淫者之所造乎故間邪在乎存誠不在善察息淫在乎去華不在兹章絶盜在乎去欲不在嚴刑止訟在乎不尚不在善聽故不攻其為也使其無心於為也不害其欲也使其無心於欲也謀之於未兆為之於未始如斯而已矣故竭聖智以治巧僞未若見質素以靜民欲興仁義以敦薄俗未若抱朴以全篤實多巧利以興事用未若寡私欲以息華競故絶司察潜聰明去勸進翦華譽棄巧用賤寶貨唯在使民愛欲不生不在攻其為邪也故見素朴以絶聖智寡私欲以棄巧利皆崇本以息末之謂也夫素朴之道不著而好欲之美不隱雖極聖明以察之竭智慮以攻之巧愈思精僞愈多變攻之彌甚避之彌勤則乃愚智相欺六親相疑朴散真離事有其姦蓋捨本而攻末雖極聖智愈致斯災况術之下此者乎夫鎮之以素朴則無為而自正攻之以聖智則民窮而巧殷故素朴可抱而聖智可棄夫察司之簡則避之亦簡竭其聰明則逃之亦察簡則害朴寡密則巧僞深矣夫能為至察探幽之術者匪唯聖智哉其為害也豈可記乎故百倍之利未渠多也夫不能辨名則不可與言理不能定名則不可與論實也凡民生於形未有形生於民者也故有此名必有此形有此形必有其分仁不得謂之聖智不得謂之仁則各有其實矣夫察見至微者明之極也探射隱伏者慮之極也能盡極明匪唯聖乎能盡極慮匪唯智乎校實定名以觀絶聖可無惑矣夫敦朴之德不著而名行之美顯尚則修其所尚而望其譽修其所道而冀其利望譽冀利以勤其行名彌美而誠愈外利彌重而心愈競父子兄弟懷情失直孝不任誠慈不任實蓋顯名行之所招也患俗薄而名興行崇仁義愈致斯僞况術之賤此者乎故絶仁棄義以復孝慈未渠弘也夫城高則衝生利興則求深苟存無欲則雖賞而不竊私欲苟行則巧利愈昏故絶巧棄利代以寡欲盜則無有未足美也夫聖智才之傑也仁義行之大者也巧利用之善也本苟不存而興此三美害猶如之况術之有利斯以忽素朴乎故古人有歎曰甚矣何物之難悟也既知不聖為不聖未知聖之不聖也既知不仁為不仁未知仁之為不仁也故絶聖而後聖功全棄仁而後仁德厚夫惡强非欲不强也為强則失强也絶仁非欲不仁也為仁則僞成也有其治而乃亂保其安而乃危後其身而身先身先非先身之所能也外其身而身存身存非存身之所為也功不可取美不可用故必取其為功之母而已矣篇云既知其子而必復守其母尋斯理也何往而不暢哉老子微旨例略
